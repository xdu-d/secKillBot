spring:
  datasource:
    url: jdbc:h2:mem:seckillbot;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  redis:
    host: 127.0.0.1
    port: 6379
    database: 0

server:
  port: 8080

logging:
  level:
    com.xdud.seckillbot: DEBUG
    org.springframework.security: DEBUG
