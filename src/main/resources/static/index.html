<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - secKillBot</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="app">
  <div class="login-wrapper">
    <el-card class="login-card" shadow="always">
      <div class="login-title">
        <h1>⚡ secKillBot</h1>
        <p>多平台秒杀机器人管理系统</p>
      </div>
      <el-form :model="form" :rules="rules" ref="loginForm" @submit.prevent="handleLogin">
        <el-form-item prop="username">
          <el-input
            v-model="form.username"
            placeholder="用户名"
            prefix-icon="User"
            size="large"
            clearable
          />
        </el-form-item>
        <el-form-item prop="password">
          <el-input
            v-model="form.password"
            placeholder="密码"
            prefix-icon="Lock"
            type="password"
            size="large"
            show-password
            @keyup.enter="handleLogin"
          />
        </el-form-item>
        <el-form-item>
          <el-button
            type="primary"
            size="large"
            style="width:100%"
            :loading="loading"
            @click="handleLogin"
          >
            登 录
          </el-button>
        </el-form-item>
      </el-form>
    </el-card>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="/js/api.js"></script>
<script>
const { createApp, ref, onMounted } = Vue;

createApp({
  setup() {
    const loginForm = ref(null);
    const loading = ref(false);
    const form = ref({ username: '', password: '' });
    const rules = {
      username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
      password: [{ required: true, message: '请输入密码', trigger: 'blur' }]
    };

    onMounted(() => {
      if (localStorage.getItem('jwt_token')) {
        window.location.href = '/dashboard.html';
      }
    });

    async function handleLogin() {
      if (!loginForm.value) return;
      const valid = await loginForm.value.validate().catch(() => false);
      if (!valid) return;

      loading.value = true;
      try {
        const res = await api.auth.login(form.value.username, form.value.password);
        localStorage.setItem('jwt_token', res.data.token);
        localStorage.setItem('jwt_username', form.value.username);
        window.location.href = '/dashboard.html';
      } catch (e) {
        ElementPlus.ElMessage.error(e.message || '登录失败');
      } finally {
        loading.value = false;
      }
    }

    return { form, rules, loginForm, loading, handleLogin };
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
