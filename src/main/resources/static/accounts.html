<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号管理 - secKillBot</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="app">
  <!-- 导航栏 -->
  <div class="nav-container">
    <el-menu mode="horizontal" :default-active="'accounts'" background-color="#fff">
      <el-menu-item index="dashboard" @click="go('dashboard')">🏠 仪表板</el-menu-item>
      <el-menu-item index="accounts"  @click="go('accounts')">👤 账号管理</el-menu-item>
      <el-menu-item index="tasks"     @click="go('tasks')">📋 任务管理</el-menu-item>
      <el-menu-item index="logs"      @click="go('logs')">📄 执行日志</el-menu-item>
      <div class="nav-spacer"></div>
      <el-menu-item @click="logout" style="margin-left:auto">退出 ({{ username }})</el-menu-item>
    </el-menu>
  </div>

  <div class="main-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="color:#303133;margin:0">账号管理</h2>
      <el-button type="primary" @click="showCreateDialog">+ 新增账号</el-button>
    </div>

    <el-card shadow="never">
      <el-table :data="accounts" stripe v-loading="loading" style="width:100%">
        <el-table-column prop="id"           label="ID"       width="60" />
        <el-table-column prop="platformType" label="平台"     width="90" />
        <el-table-column prop="name"         label="账号名"   min-width="120" />
        <el-table-column prop="phone"        label="手机号"   width="130" />
        <el-table-column prop="status"       label="状态"     width="110">
          <template #default="{ row }">
            <el-tag :type="statusTagType(row.status)" size="small">{{ row.status }}</el-tag>
          </template>
        </el-table-column>
        <el-table-column prop="authExpiresAt" label="认证到期" min-width="150">
          <template #default="{ row }">{{ formatDt(row.authExpiresAt) }}</template>
        </el-table-column>
        <el-table-column prop="remark" label="备注" min-width="120" show-overflow-tooltip />
        <el-table-column label="操作" width="240" fixed="right">
          <template #default="{ row }">
            <div class="action-btns">
              <el-button size="small" @click="sendSms(row)">发送短信</el-button>
              <el-button size="small" type="primary" @click="showSmsLogin(row)">短信登录</el-button>
              <el-button size="small" type="danger" @click="deleteAccount(row)">删除</el-button>
            </div>
          </template>
        </el-table-column>
      </el-table>
      <div class="pagination-wrap">
        <el-pagination
          v-model:current-page="pagination.current"
          v-model:page-size="pagination.size"
          :total="pagination.total"
          :page-sizes="[10, 20, 50]"
          layout="total, sizes, prev, pager, next"
          @size-change="loadAccounts"
          @current-change="loadAccounts"
        />
      </div>
    </el-card>
  </div>

  <!-- 新增账号弹框 -->
  <el-dialog v-model="createVisible" title="新增账号" width="480px" :close-on-click-modal="false">
    <el-form :model="createForm" :rules="createRules" ref="createFormRef" label-width="90px">
      <el-form-item label="平台" prop="platformType">
        <el-select v-model="createForm.platformType" placeholder="选择平台" style="width:100%">
          <el-option label="i茅台" value="IMOUTAI" />
          <el-option label="大麦网" value="DAMAI" />
          <el-option label="猫眼" value="MAOYAN" />
        </el-select>
      </el-form-item>
      <el-form-item label="账号名" prop="name">
        <el-input v-model="createForm.name" placeholder="账号备注名称" />
      </el-form-item>
      <el-form-item label="手机号" prop="phone">
        <el-input v-model="createForm.phone" placeholder="登录手机号" />
      </el-form-item>
      <el-form-item label="凭据JSON" prop="credentialJson">
        <el-input
          v-model="createForm.credentialJson"
          type="textarea"
          :rows="3"
          placeholder='{"token":"...", "deviceId":"..."}'
        />
      </el-form-item>
      <el-form-item label="备注">
        <el-input v-model="createForm.remark" placeholder="可选备注" />
      </el-form-item>
    </el-form>
    <template #footer>
      <el-button @click="createVisible = false">取消</el-button>
      <el-button type="primary" :loading="submitting" @click="submitCreate">创建</el-button>
    </template>
  </el-dialog>

  <!-- 短信登录弹框 -->
  <el-dialog v-model="smsVisible" title="短信登录" width="360px" :close-on-click-modal="false">
    <el-form>
      <el-form-item label="验证码">
        <el-input v-model="smsCode" placeholder="请输入收到的验证码" clearable />
      </el-form-item>
    </el-form>
    <template #footer>
      <el-button @click="smsVisible = false">取消</el-button>
      <el-button type="primary" :loading="submitting" @click="submitSmsLogin">确认登录</el-button>
    </template>
  </el-dialog>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="/js/api.js"></script>
<script>
const { createApp, ref, reactive, onMounted } = Vue;

createApp({
  setup() {
    const username = ref(localStorage.getItem('jwt_username') || 'admin');
    const loading = ref(false);
    const submitting = ref(false);
    const accounts = ref([]);
    const pagination = reactive({ current: 1, size: 10, total: 0 });

    // 新增弹框
    const createVisible = ref(false);
    const createFormRef = ref(null);
    const createForm = reactive({
      platformType: '', name: '', phone: '', credentialJson: '', remark: ''
    });
    const createRules = {
      platformType: [{ required: true, message: '请选择平台', trigger: 'change' }],
      name:         [{ required: true, message: '请输入账号名', trigger: 'blur' }],
      phone:        [{ required: true, message: '请输入手机号', trigger: 'blur' }]
    };

    // 短信登录弹框
    const smsVisible = ref(false);
    const smsCode = ref('');
    const currentAccountId = ref(null);

    onMounted(async () => {
      if (!localStorage.getItem('jwt_token')) {
        window.location.href = '/index.html';
        return;
      }
      await loadAccounts();
    });

    async function loadAccounts() {
      loading.value = true;
      try {
        const res = await api.accounts.list(pagination.current, pagination.size);
        accounts.value = res.data.records || [];
        pagination.total = res.data.total || 0;
      } catch (e) {
        ElementPlus.ElMessage.error('加载失败：' + e.message);
      } finally {
        loading.value = false;
      }
    }

    function showCreateDialog() {
      Object.assign(createForm, { platformType: '', name: '', phone: '', credentialJson: '', remark: '' });
      createVisible.value = true;
    }

    async function submitCreate() {
      if (!createFormRef.value) return;
      const valid = await createFormRef.value.validate().catch(() => false);
      if (!valid) return;
      submitting.value = true;
      try {
        await api.accounts.create({ ...createForm });
        ElementPlus.ElMessage.success('创建成功');
        createVisible.value = false;
        await loadAccounts();
      } catch (e) {
        ElementPlus.ElMessage.error('创建失败：' + e.message);
      } finally {
        submitting.value = false;
      }
    }

    async function sendSms(row) {
      try {
        await api.accounts.sendSms(row.id);
        ElementPlus.ElMessage.success('短信已发送');
      } catch (e) {
        ElementPlus.ElMessage.error('发送失败：' + e.message);
      }
    }

    function showSmsLogin(row) {
      currentAccountId.value = row.id;
      smsCode.value = '';
      smsVisible.value = true;
    }

    async function submitSmsLogin() {
      if (!smsCode.value) {
        ElementPlus.ElMessage.warning('请输入验证码');
        return;
      }
      submitting.value = true;
      try {
        await api.accounts.loginSms(currentAccountId.value, smsCode.value);
        ElementPlus.ElMessage.success('登录成功');
        smsVisible.value = false;
        await loadAccounts();
      } catch (e) {
        ElementPlus.ElMessage.error('登录失败：' + e.message);
      } finally {
        submitting.value = false;
      }
    }

    async function deleteAccount(row) {
      try {
        await ElementPlus.ElMessageBox.confirm(
          `确定要删除账号「${row.name}」吗？`, '确认删除',
          { type: 'warning', confirmButtonText: '删除', cancelButtonText: '取消', confirmButtonClass: 'el-button--danger' }
        );
        await api.accounts.delete(row.id);
        ElementPlus.ElMessage.success('已删除');
        await loadAccounts();
      } catch (e) {
        if (e !== 'cancel') ElementPlus.ElMessage.error('删除失败：' + e.message);
      }
    }

    function statusTagType(status) {
      const map = { ACTIVE: 'success', INACTIVE: 'info', AUTH_EXPIRED: 'danger' };
      return map[status] || 'info';
    }

    function formatDt(dt) {
      if (!dt) return '-';
      return dt.replace('T', ' ').substring(0, 19);
    }

    function go(page) { window.location.href = '/' + page + '.html'; }

    function logout() {
      localStorage.removeItem('jwt_token');
      localStorage.removeItem('jwt_username');
      window.location.href = '/index.html';
    }

    return {
      username, loading, submitting, accounts, pagination,
      createVisible, createFormRef, createForm, createRules,
      smsVisible, smsCode,
      loadAccounts, showCreateDialog, submitCreate,
      sendSms, showSmsLogin, submitSmsLogin, deleteAccount,
      statusTagType, formatDt, go, logout
    };
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
