<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务管理 - secKillBot</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="app">
  <!-- 导航栏 -->
  <div class="nav-container">
    <el-menu mode="horizontal" :default-active="'tasks'" background-color="#fff">
      <el-menu-item index="dashboard" @click="go('dashboard')">🏠 仪表板</el-menu-item>
      <el-menu-item index="accounts"  @click="go('accounts')">👤 账号管理</el-menu-item>
      <el-menu-item index="tasks"     @click="go('tasks')">📋 任务管理</el-menu-item>
      <el-menu-item index="logs"      @click="go('logs')">📄 执行日志</el-menu-item>
      <div class="nav-spacer"></div>
      <el-menu-item @click="logout" style="margin-left:auto">退出 ({{ username }})</el-menu-item>
    </el-menu>
  </div>

  <div class="main-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="color:#303133;margin:0">任务管理</h2>
      <el-button type="primary" @click="showDialog()">+ 新增任务</el-button>
    </div>

    <el-card shadow="never">
      <el-table :data="tasks" stripe v-loading="loading" style="width:100%">
        <el-table-column prop="id"          label="ID"     width="60" />
        <el-table-column prop="name"        label="任务名" min-width="140" show-overflow-tooltip />
        <el-table-column prop="platformType" label="平台"  width="90" />
        <el-table-column prop="productId"   label="商品ID" min-width="120" show-overflow-tooltip />
        <el-table-column prop="triggerAt"   label="触发时间" min-width="155">
          <template #default="{ row }">{{ formatDt(row.triggerAt) }}</template>
        </el-table-column>
        <el-table-column prop="status"      label="状态"   width="110">
          <template #default="{ row }">
            <el-tag :type="statusTagType(row.status)" size="small">{{ row.status }}</el-tag>
          </template>
        </el-table-column>
        <el-table-column prop="executionMode" label="模式" width="90" />
        <el-table-column label="操作" width="260" fixed="right">
          <template #default="{ row }">
            <div class="action-btns">
              <el-button
                size="small" type="primary"
                :disabled="row.status !== 'DRAFT'"
                @click="scheduleTask(row)"
              >调度</el-button>
              <el-button
                size="small" type="warning"
                :disabled="!['SCHEDULED','RUNNING'].includes(row.status)"
                @click="cancelTask(row)"
              >取消</el-button>
              <el-button size="small" @click="showDialog(row)">编辑</el-button>
              <el-button size="small" type="danger" @click="deleteTask(row)">删除</el-button>
            </div>
          </template>
        </el-table-column>
      </el-table>
      <div class="pagination-wrap">
        <el-pagination
          v-model:current-page="pagination.current"
          v-model:page-size="pagination.size"
          :total="pagination.total"
          :page-sizes="[10, 20, 50]"
          layout="total, sizes, prev, pager, next"
          @size-change="loadTasks"
          @current-change="loadTasks"
        />
      </div>
    </el-card>
  </div>

  <!-- 新增/编辑弹框 -->
  <el-dialog v-model="dialogVisible" :title="editId ? '编辑任务' : '新增任务'" width="520px" :close-on-click-modal="false">
    <el-form :model="form" :rules="rules" ref="formRef" label-width="100px">
      <el-form-item label="任务名" prop="name">
        <el-input v-model="form.name" placeholder="任务名称" />
      </el-form-item>
      <el-form-item label="平台" prop="platformType">
        <el-select v-model="form.platformType" placeholder="选择平台" style="width:100%">
          <el-option label="i茅台" value="IMOUTAI" />
          <el-option label="大麦网" value="DAMAI" />
          <el-option label="猫眼" value="MAOYAN" />
        </el-select>
      </el-form-item>
      <el-form-item label="商品ID" prop="productId">
        <el-input v-model="form.productId" placeholder="平台商品 ID" />
      </el-form-item>
      <el-form-item label="商品名称">
        <el-input v-model="form.productName" placeholder="可选" />
      </el-form-item>
      <el-form-item label="触发时间" prop="triggerAt">
        <el-date-picker
          v-model="form.triggerAt"
          type="datetime"
          placeholder="选择触发时间"
          style="width:100%"
          format="YYYY-MM-DD HH:mm:ss"
          value-format="YYYY-MM-DDTHH:mm:ss"
        />
      </el-form-item>
      <el-form-item label="提前量(ms)">
        <el-input-number v-model="form.advanceMs" :min="0" :max="5000" />
      </el-form-item>
      <el-form-item label="执行模式" prop="executionMode">
        <el-radio-group v-model="form.executionMode">
          <el-radio label="PARALLEL">并行</el-radio>
          <el-radio label="SEQUENTIAL">顺序</el-radio>
        </el-radio-group>
      </el-form-item>
      <el-form-item label="备注">
        <el-input v-model="form.remark" placeholder="可选备注" />
      </el-form-item>
    </el-form>
    <template #footer>
      <el-button @click="dialogVisible = false">取消</el-button>
      <el-button type="primary" :loading="submitting" @click="submitForm">
        {{ editId ? '保存' : '创建' }}
      </el-button>
    </template>
  </el-dialog>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="/js/api.js"></script>
<script>
const { createApp, ref, reactive, onMounted } = Vue;

createApp({
  setup() {
    const username = ref(localStorage.getItem('jwt_username') || 'admin');
    const loading = ref(false);
    const submitting = ref(false);
    const tasks = ref([]);
    const pagination = reactive({ current: 1, size: 10, total: 0 });

    const dialogVisible = ref(false);
    const editId = ref(null);
    const formRef = ref(null);
    const form = reactive({
      name: '', platformType: '', productId: '', productName: '',
      triggerAt: '', advanceMs: 100, executionMode: 'PARALLEL', remark: ''
    });
    const rules = {
      name:          [{ required: true, message: '请输入任务名', trigger: 'blur' }],
      platformType:  [{ required: true, message: '请选择平台', trigger: 'change' }],
      productId:     [{ required: true, message: '请输入商品ID', trigger: 'blur' }],
      triggerAt:     [{ required: true, message: '请选择触发时间', trigger: 'change' }],
      executionMode: [{ required: true, message: '请选择执行模式', trigger: 'change' }]
    };

    onMounted(async () => {
      if (!localStorage.getItem('jwt_token')) {
        window.location.href = '/index.html';
        return;
      }
      await loadTasks();
    });

    async function loadTasks() {
      loading.value = true;
      try {
        const res = await api.tasks.list(pagination.current, pagination.size);
        tasks.value = res.data.records || [];
        pagination.total = res.data.total || 0;
      } catch (e) {
        ElementPlus.ElMessage.error('加载失败：' + e.message);
      } finally {
        loading.value = false;
      }
    }

    function showDialog(row) {
      if (row) {
        editId.value = row.id;
        Object.assign(form, {
          name: row.name, platformType: row.platformType, productId: row.productId,
          productName: row.productName || '', triggerAt: row.triggerAt || '',
          advanceMs: row.advanceMs || 100, executionMode: row.executionMode || 'PARALLEL',
          remark: row.remark || ''
        });
      } else {
        editId.value = null;
        Object.assign(form, {
          name: '', platformType: '', productId: '', productName: '',
          triggerAt: '', advanceMs: 100, executionMode: 'PARALLEL', remark: ''
        });
      }
      dialogVisible.value = true;
    }

    async function submitForm() {
      if (!formRef.value) return;
      const valid = await formRef.value.validate().catch(() => false);
      if (!valid) return;
      submitting.value = true;
      try {
        const payload = { ...form, accountIds: [] };
        if (editId.value) {
          await api.tasks.update(editId.value, payload);
          ElementPlus.ElMessage.success('已更新');
        } else {
          await api.tasks.create(payload);
          ElementPlus.ElMessage.success('创建成功');
        }
        dialogVisible.value = false;
        await loadTasks();
      } catch (e) {
        ElementPlus.ElMessage.error('操作失败：' + e.message);
      } finally {
        submitting.value = false;
      }
    }

    async function scheduleTask(row) {
      try {
        await api.tasks.schedule(row.id);
        ElementPlus.ElMessage.success('已调度');
        await loadTasks();
      } catch (e) {
        ElementPlus.ElMessage.error('调度失败：' + e.message);
      }
    }

    async function cancelTask(row) {
      try {
        await ElementPlus.ElMessageBox.confirm(
          `确定要取消任务「${row.name}」吗？`, '确认取消',
          { type: 'warning', confirmButtonText: '取消任务', cancelButtonText: '返回' }
        );
        await api.tasks.cancel(row.id);
        ElementPlus.ElMessage.success('已取消');
        await loadTasks();
      } catch (e) {
        if (e !== 'cancel') ElementPlus.ElMessage.error('操作失败：' + e.message);
      }
    }

    async function deleteTask(row) {
      try {
        await ElementPlus.ElMessageBox.confirm(
          `确定要删除任务「${row.name}」吗？`, '确认删除',
          { type: 'warning', confirmButtonText: '删除', cancelButtonText: '取消', confirmButtonClass: 'el-button--danger' }
        );
        await api.tasks.delete(row.id);
        ElementPlus.ElMessage.success('已删除');
        await loadTasks();
      } catch (e) {
        if (e !== 'cancel') ElementPlus.ElMessage.error('删除失败：' + e.message);
      }
    }

    function statusTagType(status) {
      const map = {
        DRAFT: 'info', SCHEDULED: 'warning', RUNNING: 'primary',
        SUCCESS: 'success', FAILED: 'danger', CANCELLED: 'info'
      };
      return map[status] || 'info';
    }

    function formatDt(dt) {
      if (!dt) return '-';
      return dt.replace('T', ' ').substring(0, 19);
    }

    function go(page) { window.location.href = '/' + page + '.html'; }

    function logout() {
      localStorage.removeItem('jwt_token');
      localStorage.removeItem('jwt_username');
      window.location.href = '/index.html';
    }

    return {
      username, loading, submitting, tasks, pagination,
      dialogVisible, editId, formRef, form, rules,
      loadTasks, showDialog, submitForm, scheduleTask, cancelTask, deleteTask,
      statusTagType, formatDt, go, logout
    };
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
